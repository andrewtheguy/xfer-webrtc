[package]
name = "xfer-webrtc"
version = "0.0.1"
edition = "2024"
publish = false

[lib]
name = "xfer_webrtc"
path = "src/lib.rs"

[[bin]]
name = "xfer-webrtc"
path = "src/main.rs"

[dependencies]
# Core
tokio = { version = "1", features = ["full"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
hex = "0.4"
rand = "0.9"
futures = "0.3"
log = "0.4"

# File handling
tempfile = "3"
tar = "0.4"
walkdir = "2"
xxhash-rust = { version = "0.8", features = ["xxh64"] }

# HTTP client for relay fetching
reqwest = { version = "0.13", features = ["json", "multipart", "stream"] }

# Nostr signaling
nostr-sdk = "0.44.1"

# WebRTC transport
webrtc = "0.17"
bytes = "1"
crc32fast = "1.4"

# CLI (interactive prompts + arg parsing)
rustyline = "18"
clap = { version = "4", features = ["derive"] }
env_logger = "0.11"

[profile.release]
strip = true
lto = "thin"
codegen-units = 1
panic = "abort"
