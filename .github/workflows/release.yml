name: Release (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.new }}
      is_prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          version=$(python3 -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('Cargo.toml').read_text())['package']['version'])")
          echo "new=$version" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if tag already exists
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.new }}" | grep -q .; then
            echo "::error::Tag ${{ steps.version.outputs.new }} already exists on remote"
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Clean up any leftover draft from a previous failed run with the same version.
          # A draft release doesn't create the git tag on the remote, so a stale draft is the
          # only thing that can collide here (real published tags are caught by the step above).
          if gh release view "${{ steps.version.outputs.new }}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -qx true; then
            echo "Deleting stale draft release ${{ steps.version.outputs.new }}"
            gh release delete "${{ steps.version.outputs.new }}" --yes
          fi
          gh release create "${{ steps.version.outputs.new }}" \
            --draft \
            --target "${{ github.sha }}" \
            --title "Release ${{ steps.version.outputs.new }}" \
            --generate-notes \
            ${{ steps.version.outputs.prerelease == 'true' && '--prerelease' || '' }}

  build-linux:
    needs: setup
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Release
        run: cargo build --release --all-features --target ${{ matrix.target }}

      - name: Rename CLI binary
        run: mv target/${{ matrix.target }}/release/secure-send-cli target/release/secure-send-cli-${{ matrix.suffix }}

      - name: Upload CLI release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-secure-send-cli-${{ matrix.suffix }}
          path: target/release/secure-send-cli-${{ matrix.suffix }}

  build-macos:
    needs: setup
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Release
        run: cargo build --release --all-features --target ${{ matrix.target }}

      - name: Rename CLI binary
        run: mv target/${{ matrix.target }}/release/secure-send-cli target/release/secure-send-cli-${{ matrix.suffix }}

      - name: Upload CLI release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-secure-send-cli-${{ matrix.suffix }}
          path: target/release/secure-send-cli-${{ matrix.suffix }}

  build-windows:
    needs: setup
    # Windows binaries are only built for stable (non-prerelease) releases.
    if: needs.setup.outputs.is_prerelease == 'false'
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-msvc
      SUFFIX: windows-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Release
        run: cargo build --release --all-features --target ${{ env.TARGET }}

      - name: Rename CLI binary
        run: move target\${{ env.TARGET }}\release\secure-send-cli.exe target\release\secure-send-cli-${{ env.SUFFIX }}.exe

      - name: Upload CLI release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-secure-send-cli-${{ env.SUFFIX }}
          path: target/release/secure-send-cli-${{ env.SUFFIX }}.exe

  create-release:
    needs: [setup, build-linux, build-macos, build-windows]
    # build-windows is skipped for prereleases; tolerate that while still
    # requiring the other build jobs to have succeeded.
    if: >-
      always()
      && needs.setup.result == 'success'
      && needs.build-linux.result == 'success'
      && needs.build-macos.result == 'success'
      && (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload artifacts to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ needs.setup.outputs.release_tag }}" artifacts/* --clobber

      - name: Publish release (remove draft, creates the tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ needs.setup.outputs.release_tag }}" --draft=false
